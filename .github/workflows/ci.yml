name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (Required)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

  quality:
    name: Quality Signals (Non-Blocking)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        continue-on-error: true
        run: bun run lint

      - name: Typecheck
        continue-on-error: true
        run: bun run typecheck

      - name: Tests (if present)
        continue-on-error: true
        shell: bash
        run: |
          if git ls-files | grep -Eq '(test|spec)\.(c|m)?(t|j)sx?$'; then
            bun run test
          else
            echo "No test files found. Skipping tests."
          fi
